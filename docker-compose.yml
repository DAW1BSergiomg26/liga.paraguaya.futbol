services:
  postgres:
    image: postgres:16-alpine
    container_name: ligaparaguayafut-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: liga
      POSTGRES_USER: liga
      POSTGRES_PASSWORD: liga_password
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U liga -d liga"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8001:10000"
    volumes:
      - backend_data:/app/data
    environment:
      - DATABASE_URL=postgresql://liga:liga_password@postgres:5432/liga
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8001

volumes:
  backend_data:
  pgdata:
