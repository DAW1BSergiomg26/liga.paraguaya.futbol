<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <defs>
    <radialGradient id="ballMetal" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="50%" stop-color="#F0F2F5"/>
      <stop offset="100%" stop-color="#C8CDD5"/>
    </radialGradient>
    <radialGradient id="ballGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0057B8" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#0057B8" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="panelBlue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0057B8" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#003D82" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="panelRed" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#D52B1E" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#A51F15" stop-opacity="0.85"/>
    </linearGradient>
    <filter id="ballShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.15"/>
    </filter>
    <clipPath id="ballClip">
      <circle cx="60" cy="60" r="54"/>
    </clipPath>
  </defs>

  <!-- Outer glow -->
  <circle cx="60" cy="60" r="58" fill="url(#ballGlow)"/>

  <!-- Main ball body -->
  <circle cx="60" cy="60" r="54" fill="url(#ballMetal)" stroke="#AEB8C5" stroke-width="1.5" filter="url(#ballShadow)"/>

  <!-- Panels (clipped to ball) -->
  <g clip-path="url(#ballClip)">
    <!-- Central pentagon -->
    <polygon points="60,38 73,49 69,65 51,65 47,49" fill="url(#panelBlue)" opacity="0.9"/>
    <polygon points="60,40 71,50 68,63 52,63 49,50" fill="none" stroke="#FFF" stroke-width="0.8" opacity="0.5"/>

    <!-- Panel lines radiating from center -->
    <path d="M60,38 L60,6" stroke="#AEB8C5" stroke-width="1.2" fill="none"/>
    <path d="M73,49 L98,32" stroke="#AEB8C5" stroke-width="1.2" fill="none"/>
    <path d="M69,65 L95,85" stroke="#AEB8C5" stroke-width="1.2" fill="none"/>
    <path d="M51,65 L25,85" stroke="#AEB8C5" stroke-width="1.2" fill="none"/>
    <path d="M47,49 L22,32" stroke="#AEB8C5" stroke-width="1.2" fill="none"/>

    <!-- Secondary curved panels -->
    <path d="M60,6 Q78,20 73,49" fill="url(#panelRed)" opacity="0.3"/>
    <path d="M73,49 Q95,60 69,65" fill="url(#panelBlue)" opacity="0.2"/>
    <path d="M69,65 Q60,90 51,65" fill="url(#panelRed)" opacity="0.25"/>
    <path d="M51,65 Q25,60 47,49" fill="url(#panelBlue)" opacity="0.2"/>
    <path d="M47,49 Q42,20 60,6" fill="url(#panelRed)" opacity="0.3"/>

    <!-- ñandutí lace pattern (subtle hexagonal mesh) -->
    <path d="M60,22 L68,28 L68,38 L60,42 L52,38 L52,28 Z" fill="none" stroke="#0057B8" stroke-width="0.5" opacity="0.25"/>
    <path d="M80,40 L86,48 L86,58 L80,62 L74,58 L74,48 Z" fill="none" stroke="#D52B1E" stroke-width="0.5" opacity="0.2"/>
    <path d="M72,68 L78,76 L78,84 L72,88 L66,84 L66,76 Z" fill="none" stroke="#0057B8" stroke-width="0.5" opacity="0.25"/>
    <path d="M40,68 L46,76 L46,84 L40,88 L34,84 L34,76 Z" fill="none" stroke="#D52B1E" stroke-width="0.5" opacity="0.2"/>
    <path d="M34,40 L40,48 L40,58 L34,62 L28,58 L28,48 Z" fill="none" stroke="#0057B8" stroke-width="0.5" opacity="0.25"/>

    <!-- Specular highlight -->
    <ellipse cx="45" cy="35" rx="18" ry="12" fill="#FFF" opacity="0.35" transform="rotate(-20,45,35)"/>
    <ellipse cx="42" cy="32" rx="8" ry="5" fill="#FFF" opacity="0.5" transform="rotate(-20,42,32)"/>
  </g>

  <!-- Outer ring -->
  <circle cx="60" cy="60" r="54" fill="none" stroke="#AEB8C5" stroke-width="1.5"/>
  <circle cx="60" cy="60" r="56" fill="none" stroke="#0057B8" stroke-width="0.5" opacity="0.3"/>
</svg>