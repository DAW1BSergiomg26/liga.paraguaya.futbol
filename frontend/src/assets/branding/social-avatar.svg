<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <radialGradient id="saBg" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#0A1A2E"/>
      <stop offset="100%" stop-color="#0B1D3A"/>
    </radialGradient>
    <radialGradient id="saBallMetal" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="50%" stop-color="#F0F2F5"/>
      <stop offset="100%" stop-color="#C8CDD5"/>
    </radialGradient>
    <linearGradient id="saPanelBlue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0057B8"/>
      <stop offset="100%" stop-color="#003D82"/>
    </linearGradient>
    <clipPath id="saBallClip">
      <circle cx="100" cy="88" r="50"/>
    </clipPath>
    <clipPath id="saCircle">
      <circle cx="100" cy="100" r="98"/>
    </clipPath>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="98" fill="url(#saBg)" stroke="#0057B8" stroke-width="2"/>

  <!-- Ball (centered, large) -->
  <g clip-path="url(#saCircle)">
    <circle cx="100" cy="88" r="52" fill="url(#saBallMetal)" stroke="#AEB8C5" stroke-width="1.2"/>
    <g clip-path="url(#saBallClip)">
      <polygon points="100,56 113,66 110,82 90,82 87,66" fill="url(#saPanelBlue)" opacity="0.9"/>
      <path d="M100,56 L100,32" stroke="#AEB8C5" stroke-width="0.9"/>
      <path d="M113,66 L136,50" stroke="#AEB8C5" stroke-width="0.9"/>
      <path d="M110,82 L133,98" stroke="#AEB8C5" stroke-width="0.9"/>
      <path d="M90,82 L67,98" stroke="#AEB8C5" stroke-width="0.9"/>
      <path d="M87,66 L64,50" stroke="#AEB8C5" stroke-width="0.9"/>
      <path d="M100,56 Q112,48 113,66" fill="#D52B1E" opacity="0.2"/>
      <path d="M113,66 Q130,74 110,82" fill="#0057B8" opacity="0.15"/>
      <path d="M110,82 Q100,102 90,82" fill="#D52B1E" opacity="0.2"/>
      <path d="M90,82 Q70,74 87,66" fill="#0057B8" opacity="0.15"/>
      <path d="M87,66 Q86,48 100,56" fill="#D52B1E" opacity="0.2"/>
      <ellipse cx="92" cy="60" rx="16" ry="10" fill="#FFF" opacity="0.35" transform="rotate(-20,92,60)"/>
    </g>
    <circle cx="100" cy="88" r="52" fill="none" stroke="#AEB8C5" stroke-width="1.2"/>
  </g>

  <!-- "APF" text at bottom -->
  <text x="100" y="162" text-anchor="middle" font-family="'Space Grotesk','Inter',sans-serif" font-size="22" font-weight="700" fill="#F4C542" letter-spacing="8">APF</text>
  <text x="100" y="178" text-anchor="middle" font-family="'Inter',sans-serif" font-size="9" font-weight="400" fill="#AEB8C5" letter-spacing="3">LIGA PARAGUAYA</text>
</svg>