<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <defs>
    <radialGradient id="iBallMetal" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="50%" stop-color="#F0F2F5"/>
      <stop offset="100%" stop-color="#C8CDD5"/>
    </radialGradient>
    <linearGradient id="iPanelBlue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0057B8"/>
      <stop offset="100%" stop-color="#003D82"/>
    </linearGradient>
    <radialGradient id="iGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0057B8" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#0057B8" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="iBallClip">
      <circle cx="60" cy="60" r="50"/>
    </clipPath>
  </defs>

  <!-- Background glow -->
  <circle cx="60" cy="60" r="58" fill="url(#iGlow)"/>

  <!-- Ball -->
  <circle cx="60" cy="60" r="52" fill="url(#iBallMetal)" stroke="#AEB8C5" stroke-width="1.5"/>
  <g clip-path="url(#iBallClip)">
    <polygon points="60,30 73,40 70,56 50,56 47,40" fill="url(#iPanelBlue)" opacity="0.9"/>
    <path d="M60,30 L60,6" stroke="#AEB8C5" stroke-width="1"/>
    <path d="M73,40 L96,24" stroke="#AEB8C5" stroke-width="1"/>
    <path d="M70,56 L93,74" stroke="#AEB8C5" stroke-width="1"/>
    <path d="M50,56 L27,74" stroke="#AEB8C5" stroke-width="1"/>
    <path d="M47,40 L24,24" stroke="#AEB8C5" stroke-width="1"/>
    <path d="M60,30 Q74,21 73,40" fill="#D52B1E" opacity="0.2"/>
    <path d="M73,40 Q92,50 70,56" fill="#0057B8" opacity="0.15"/>
    <path d="M70,56 Q60,78 50,56" fill="#D52B1E" opacity="0.2"/>
    <path d="M50,56 Q28,50 47,40" fill="#0057B8" opacity="0.15"/>
    <path d="M47,40 Q44,21 60,30" fill="#D52B1E" opacity="0.2"/>
    <ellipse cx="50" cy="32" rx="16" ry="10" fill="#FFF" opacity="0.35" transform="rotate(-20,50,32)"/>
    <ellipse cx="47" cy="29" rx="7" ry="4" fill="#FFF" opacity="0.5" transform="rotate(-20,47,29)"/>
  </g>
  <circle cx="60" cy="60" r="52" fill="none" stroke="#AEB8C5" stroke-width="1.5"/>
  <circle cx="60" cy="60" r="55" fill="none" stroke="#0057B8" stroke-width="0.5" opacity="0.25"/>
</svg>