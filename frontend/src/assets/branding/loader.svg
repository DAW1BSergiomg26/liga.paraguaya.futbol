<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <defs>
    <radialGradient id="lBallMetal" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="50%" stop-color="#F0F2F5"/>
      <stop offset="100%" stop-color="#C8CDD5"/>
    </radialGradient>
    <linearGradient id="lPanelBlue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0057B8"/>
      <stop offset="100%" stop-color="#003D82"/>
    </linearGradient>
    <clipPath id="lBallClip">
      <circle cx="40" cy="40" r="32"/>
    </clipPath>
    <linearGradient id="lArc" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0057B8"/>
      <stop offset="50%" stop-color="#D52B1E"/>
      <stop offset="100%" stop-color="#F4C542"/>
    </linearGradient>
  </defs>

  <!-- Loading arc (animated via CSS) -->
  <circle cx="40" cy="40" r="38" fill="none" stroke="#1A2A3A" stroke-width="2" opacity="0.2"/>
  <circle cx="40" cy="40" r="38" fill="none" stroke="url(#lArc)" stroke-width="2.5"
          stroke-dasharray="60 180" stroke-linecap="round" class="loader-arc"/>

  <!-- Ball (static center) -->
  <circle cx="40" cy="40" r="32" fill="url(#lBallMetal)" stroke="#AEB8C5" stroke-width="1"/>
  <g clip-path="url(#lBallClip)">
    <polygon points="40,20 49,27 47,39 33,39 31,27" fill="url(#lPanelBlue)" opacity="0.9"/>
    <path d="M40,20 L40,4" stroke="#AEB8C5" stroke-width="0.7"/>
    <path d="M49,27 L63,16" stroke="#AEB8C5" stroke-width="0.7"/>
    <path d="M47,39 L61,50" stroke="#AEB8C5" stroke-width="0.7"/>
    <path d="M33,39 L19,50" stroke="#AEB8C5" stroke-width="0.7"/>
    <path d="M31,27 L17,16" stroke="#AEB8C5" stroke-width="0.7"/>
    <path d="M40,20 Q48,14 49,27" fill="#D52B1E" opacity="0.2"/>
    <path d="M49,27 Q61,34 47,39" fill="#0057B8" opacity="0.15"/>
    <path d="M47,39 Q40,54 33,39" fill="#D52B1E" opacity="0.2"/>
    <path d="M33,39 Q19,34 31,27" fill="#0057B8" opacity="0.15"/>
    <path d="M31,27 Q30,14 40,20" fill="#D52B1E" opacity="0.2"/>
    <ellipse cx="35" cy="24" rx="10" ry="6" fill="#FFF" opacity="0.4" transform="rotate(-20,35,24)"/>
  </g>
  <circle cx="40" cy="40" r="32" fill="none" stroke="#AEB8C5" stroke-width="1"/>
</svg>