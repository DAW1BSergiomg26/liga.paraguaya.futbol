<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100" fill="none">
  <defs>
    <radialGradient id="hBallMetal" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="50%" stop-color="#F0F2F5"/>
      <stop offset="100%" stop-color="#C8CDD5"/>
    </radialGradient>
    <linearGradient id="hPanelBlue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0057B8" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#003D82" stop-opacity="0.9"/>
    </linearGradient>
    <clipPath id="hBallClip">
      <circle cx="50" cy="50" r="42"/>
    </clipPath>
  </defs>

  <!-- Ball icon -->
  <g transform="translate(8,8)">
    <circle cx="42" cy="42" r="42" fill="url(#hBallMetal)" stroke="#AEB8C5" stroke-width="1.2"/>
    <g clip-path="url(#hBallClip)">
      <polygon points="42,24 53,33 50,47 34,47 31,33" fill="url(#hPanelBlue)" opacity="0.9"/>
      <path d="M42,24 L42,0" stroke="#AEB8C5" stroke-width="0.9"/>
      <path d="M53,33 L75,18" stroke="#AEB8C5" stroke-width="0.9"/>
      <path d="M50,47 L72,65" stroke="#AEB8C5" stroke-width="0.9"/>
      <path d="M34,47 L12,65" stroke="#AEB8C5" stroke-width="0.9"/>
      <path d="M31,33 L9,18" stroke="#AEB8C5" stroke-width="0.9"/>
      <path d="M42,24 Q56,15 53,33" fill="#D52B1E" opacity="0.2"/>
      <path d="M53,33 Q72,42 50,47" fill="#0057B8" opacity="0.15"/>
      <path d="M50,47 Q42,68 34,47" fill="#D52B1E" opacity="0.2"/>
      <path d="M34,47 Q12,42 31,33" fill="#0057B8" opacity="0.15"/>
      <path d="M31,33 Q28,15 42,24" fill="#D52B1E" opacity="0.2"/>
      <ellipse cx="33" cy="26" rx="14" ry="9" fill="#FFF" opacity="0.35" transform="rotate(-20,33,26)"/>
    </g>
    <circle cx="42" cy="42" r="42" fill="none" stroke="#AEB8C5" stroke-width="1.2"/>
  </g>

  <!-- Wordmark -->
  <text x="115" y="42" font-family="'Space Grotesk','Inter',sans-serif" font-size="28" font-weight="700" fill="#FFFFFF" letter-spacing="1">Liga Paraguaya</text>
  <text x="115" y="65" font-family="'Inter',sans-serif" font-size="14" font-weight="400" fill="#AEB8C5" letter-spacing="4">DE FÚTBOL</text>

  <!-- Accent line -->
  <rect x="115" y="72" width="60" height="2" rx="1" fill="#D52B1E"/>
  <rect x="180" y="72" width="30" height="2" rx="1" fill="#0057B8"/>
  <rect x="215" y="72" width="15" height="2" rx="1" fill="#F4C542"/>
</svg>