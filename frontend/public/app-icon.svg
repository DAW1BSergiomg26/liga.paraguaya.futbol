<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <radialGradient id="aiBg" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#0D2240"/>
      <stop offset="100%" stop-color="#0B1D3A"/>
    </radialGradient>
    <radialGradient id="aiBallMetal" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="50%" stop-color="#F0F2F5"/>
      <stop offset="100%" stop-color="#C8CDD5"/>
    </radialGradient>
    <linearGradient id="aiPanelBlue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0057B8"/>
      <stop offset="100%" stop-color="#003D82"/>
    </linearGradient>
    <clipPath id="aiBallClip">
      <circle cx="256" cy="220" r="140"/>
    </clipPath>
    <clipPath id="aiSquare">
      <rect width="512" height="512" rx="96"/>
    </clipPath>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="96" fill="url(#aiBg)"/>

  <g clip-path="url(#aiSquare)">
    <!-- Ball (centered, large) -->
    <circle cx="256" cy="220" r="142" fill="url(#aiBallMetal)" stroke="#AEB8C5" stroke-width="3"/>
    <g clip-path="url(#aiBallClip)">
      <polygon points="256,118 286,140 280,178 232,178 226,140" fill="url(#aiPanelBlue)" opacity="0.9"/>
      <path d="M256,118 L256,60" stroke="#AEB8C5" stroke-width="2.5"/>
      <path d="M286,140 L340,100" stroke="#AEB8C5" stroke-width="2.5"/>
      <path d="M280,178 L334,220" stroke="#AEB8C5" stroke-width="2.5"/>
      <path d="M232,178 L178,220" stroke="#AEB8C5" stroke-width="2.5"/>
      <path d="M226,140 L172,100" stroke="#AEB8C5" stroke-width="2.5"/>
      <path d="M256,118 Q280,103 286,140" fill="#D52B1E" opacity="0.22"/>
      <path d="M286,140 Q326,158 280,178" fill="#0057B8" opacity="0.16"/>
      <path d="M280,178 Q256,218 232,178" fill="#D52B1E" opacity="0.22"/>
      <path d="M232,178 Q186,158 226,140" fill="#0057B8" opacity="0.16"/>
      <path d="M226,140 Q222,103 256,118" fill="#D52B1E" opacity="0.22"/>
      <ellipse cx="234" cy="130" rx="44" ry="28" fill="#FFF" opacity="0.3" transform="rotate(-20,234,130)"/>
      <ellipse cx="228" cy="122" rx="18" ry="10" fill="#FFF" opacity="0.45" transform="rotate(-20,228,122)"/>
    </g>
    <circle cx="256" cy="220" r="142" fill="none" stroke="#AEB8C5" stroke-width="3"/>

    <!-- "APF" text -->
    <text x="256" y="420" text-anchor="middle" font-family="'Space Grotesk','Inter',sans-serif" font-size="52" font-weight="700" fill="#F4C542" letter-spacing="10">APF</text>
    <text x="256" y="456" text-anchor="middle" font-family="'Inter',sans-serif" font-size="20" font-weight="400" fill="#AEB8C5" letter-spacing="5">LIGA PARAGUAYA</text>
  </g>
</svg>